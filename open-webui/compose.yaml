services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: always
    ports:
      - "8088:8080"
    environment:
      OPENAI_API_KEY: "dummy"
    extra_hosts:
      - "host.docker.internal:192.168.1.110"
    volumes:
      - open-webui:/app/backend/data

volumes:
  open-webui:
