services:
  db:
    image: mariadb:11
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    volumes:
      - nc_db:/var/lib/mysql
    networks:
      - internal   # app <-> db/redis
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - nc_redis:/data
    networks:
      - internal   # app <-> db/redis

  app:
    image: nextcloud:apache
    restart: unless-stopped
    depends_on:
      - db
      - redis
    environment:
      - MYSQL_HOST=db
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - REDIS_HOST=redis
      - NEXTCLOUD_TRUSTED_DOMAINS=${NEXTCLOUD_TRUSTED_DOMAINS}
      - PHP_UPLOAD_LIMIT=16G
      - APACHE_BODY_LIMIT=0
      - PHP_MEMORY_LIMIT=1024M
    volumes:
      - nc_app:/var/www/html
      - ${NEXTCLOUD_DATA_DIR}:/var/www/html/data
    networks:
      - internal   # app <-> db/redis
      - proxy      # NPM <-> app

      
  whiteboard:
    image: ghcr.io/nextcloud-releases/whiteboard:stable
    restart: unless-stopped
    depends_on:
      - app
    environment:
      - NEXTCLOUD_URL=${NEXTCLOUD_URL}
      - JWT_SECRET_KEY=${WHITEBOARD_JWT_SECRET}
    networks:
      - proxy      # whiteboard <-> NPM <-> app 

  cron:
    image: nextcloud:apache
    restart: unless-stopped
    depends_on:
      - db
      - redis
    volumes:
      - nc_app:/var/www/html
      - ${NEXTCLOUD_DATA_DIR}:/var/www/html/data
    environment:
      - PHP_UPLOAD_LIMIT=16G
      - APACHE_BODY_LIMIT=0
      - PHP_MEMORY_LIMIT=1024M
    entrypoint: /cron.sh
    networks:
      - internal   # app <-> db/redis

volumes:
  nc_db:
  nc_app:
  nc_redis:
    
networks:
  internal:
  proxy:
    external: true
